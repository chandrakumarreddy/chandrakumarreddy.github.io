<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,Segoe UI,Roboto,sans-serif;">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="boxblue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#162A48"/>
    </linearGradient>
    <linearGradient id="boxteal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#164E47"/>
      <stop offset="100%" stop-color="#0D3A34"/>
    </linearGradient>
    <marker id="arrowblue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowteal" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0E9488"/>
    </marker>
    <filter id="sg">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg2)"/>
  <ellipse cx="150" cy="450" rx="200" ry="130" fill="#4F46E5" opacity="0.04"/>
  <ellipse cx="800" cy="100" rx="180" ry="120" fill="#0E9488" opacity="0.04"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-size="18" font-weight="700" fill="#F1F5F9">Streaming Flow: basic.py</text>

  <!-- ── Row 1: prompt → Agent → OpenRouterModel ── -->
  <!-- Prompt box -->
  <rect x="40" y="75" width="140" height="54" rx="10" fill="#1A2035" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="110" y="98" text-anchor="middle" font-size="12" fill="#94A3B8">User prompt</text>
  <text x="110" y="116" text-anchor="middle" font-size="10" fill="#64748B">"Alice and Bob…"</text>

  <!-- Arrow → Agent -->
  <line x1="182" y1="102" x2="238" y2="102" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arrowblue)"/>
  <text x="210" y="93" text-anchor="middle" font-size="9" fill="#64748B">run_stream()</text>

  <!-- Agent box -->
  <rect x="240" y="75" width="170" height="54" rx="10" fill="url(#boxblue)" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="325" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#93C5FD">Agent</text>
  <text x="325" y="114" text-anchor="middle" font-size="10" fill="#64748B">output_type=CalenderEvent</text>

  <!-- Arrow → Model -->
  <line x1="412" y1="102" x2="468" y2="102" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arrowblue)"/>

  <!-- OpenRouterModel box -->
  <rect x="470" y="75" width="180" height="54" rx="10" fill="url(#boxblue)" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="560" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#93C5FD">OpenRouterModel</text>
  <text x="560" y="114" text-anchor="middle" font-size="10" fill="#64748B">'openrouter/free'</text>

  <!-- Arrow → OpenRouter API -->
  <line x1="652" y1="102" x2="708" y2="102" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arrowblue)"/>
  <text x="680" y="93" text-anchor="middle" font-size="9" fill="#64748B">HTTPS</text>

  <!-- OpenRouter API box -->
  <rect x="710" y="75" width="160" height="54" rx="10" fill="#1A1A35" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="5,2"/>
  <text x="790" y="97" text-anchor="middle" font-size="12" font-weight="600" fill="#818CF8">OpenRouter API</text>
  <text x="790" y="114" text-anchor="middle" font-size="10" fill="#64748B">OPENROUTER_API_KEY</text>

  <!-- ── Row 2: token stream returns ── -->
  <!-- Down arrow from API -->
  <line x1="790" y1="131" x2="790" y2="188" stroke="#0E9488" stroke-width="1.8" marker-end="url(#arrowteal)"/>
  <text x="808" y="165" font-size="9" fill="#64748B">token stream</text>

  <!-- OpenRouterModelSettings box -->
  <rect x="660" y="190" width="250" height="54" rx="10" fill="url(#boxteal)" stroke="#0E9488" stroke-width="1.5"/>
  <text x="785" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#6EE7B7">OpenRouterModelSettings</text>
  <text x="785" y="229" text-anchor="middle" font-size="10" fill="#64748B">openrouter_reasoning: disabled</text>

  <!-- Arrow back left -->
  <line x1="658" y1="217" x2="512" y2="217" stroke="#0E9488" stroke-width="1.8" marker-end="url(#arrowteal)"/>
  <text x="585" y="208" text-anchor="middle" font-size="9" fill="#64748B">streamed tokens</text>

  <!-- stream_output() box -->
  <rect x="310" y="190" width="200" height="54" rx="10" fill="url(#boxteal)" stroke="#0E9488" stroke-width="1.5"/>
  <text x="410" y="212" text-anchor="middle" font-size="12" font-weight="600" fill="#6EE7B7">stream_output()</text>
  <text x="410" y="229" text-anchor="middle" font-size="10" fill="#64748B">async iterator · debounce 0.1s</text>

  <!-- ── Row 3: partial events ── -->
  <line x1="410" y1="246" x2="410" y2="298" stroke="#0E9488" stroke-width="1.8" marker-end="url(#arrowteal)"/>
  <text x="428" y="278" font-size="9" fill="#64748B">yields partial</text>

  <!-- Partial CalenderEvent stream -->
  <rect x="200" y="300" width="640" height="90" rx="10" fill="#0A1E1A" stroke="#0E9488" stroke-width="1.5"/>
  <text x="298" y="322" text-anchor="middle" font-size="11" fill="#6EE7B7">partial #1</text>
  <text x="298" y="340" font-size="10" fill="#64748B" text-anchor="middle">name="Science…"</text>
  <text x="298" y="356" font-size="10" fill="#64748B" text-anchor="middle">date=None  participants=[]</text>

  <line x1="380" y1="345" x2="420" y2="345" stroke="#0E9488" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="520" y="322" text-anchor="middle" font-size="11" fill="#6EE7B7">partial #2</text>
  <text x="520" y="340" font-size="10" fill="#64748B" text-anchor="middle">name="Science Fair 2026"</text>
  <text x="520" y="356" font-size="10" fill="#64748B" text-anchor="middle">date="June 26"  participants=[]</text>

  <line x1="604" y1="345" x2="644" y2="345" stroke="#0E9488" stroke-width="1" stroke-dasharray="3,2"/>

  <text x="742" y="322" text-anchor="middle" font-size="11" fill="#6EE7B7">partial #N</text>
  <text x="742" y="340" font-size="10" fill="#34D399" text-anchor="middle">name="Science Fair 2026"</text>
  <text x="742" y="356" font-size="10" fill="#34D399" text-anchor="middle">date="June 26"  participants=[…]</text>

  <!-- ── Row 4: get_output ── -->
  <line x1="520" y1="392" x2="520" y2="436" stroke="#0E9488" stroke-width="1.8" marker-end="url(#arrowteal)"/>

  <rect x="290" y="438" width="460" height="50" rx="10" fill="#0A1A12" stroke="#0E9488" stroke-width="2"/>
  <text x="520" y="460" text-anchor="middle" font-size="13" font-weight="600" fill="#34D399">await result.get_output()</text>
  <text x="520" y="478" text-anchor="middle" font-size="11" fill="#6EE7B7">→ CalenderEvent(name=…, date=…, participants=[…])</text>

  <!-- Legend -->
  <rect x="40" y="200" width="220" height="85" rx="8" fill="#111827" stroke="#1E293B" stroke-width="1"/>
  <text x="55" y="222" font-size="11" font-weight="600" fill="#94A3B8">Legend</text>
  <line x1="55" y1="238" x2="90" y2="238" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrowblue)"/>
  <text x="100" y="242" font-size="10" fill="#64748B">request flow</text>
  <line x1="55" y1="258" x2="90" y2="258" stroke="#0E9488" stroke-width="2" marker-end="url(#arrowteal)"/>
  <text x="100" y="262" font-size="10" fill="#64748B">streaming response</text>
  <rect x="55" y="270" width="30" height="12" rx="3" fill="#0A1A12" stroke="#0E9488" stroke-width="1.5"/>
  <text x="100" y="281" font-size="10" fill="#64748B">validated output</text>
</svg>
