<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" style="font-family:-apple-system,Segoe UI,Roboto,sans-serif;">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="modelgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#162A48"/>
    </linearGradient>
    <linearGradient id="outputgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#164E47"/>
      <stop offset="100%" stop-color="#0D3A34"/>
    </linearGradient>
    <linearGradient id="streamline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0E9488" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glows -->
  <ellipse cx="200" cy="500" rx="300" ry="200" fill="#4F46E5" opacity="0.06"/>
  <ellipse cx="1000" cy="160" rx="280" ry="180" fill="#0E9488" opacity="0.06"/>

  <!-- ── Left: OpenRouter / LLM box ── -->
  <rect x="80" y="200" width="260" height="230" rx="16" fill="url(#modelgrad)" stroke="#4F46E5" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Hexagon model icon -->
  <polygon points="210,235 238,250 238,280 210,295 182,280 182,250" fill="none" stroke="#4F46E5" stroke-width="2" opacity="0.8"/>
  <polygon points="210,243 230,254 230,276 210,287 190,276 190,254" fill="#4F46E5" opacity="0.2"/>
  <circle cx="210" cy="265" r="10" fill="#4F46E5" opacity="0.7" filter="url(#softglow)"/>
  <text x="210" y="318" text-anchor="middle" font-size="15" font-weight="600" fill="#93C5FD">OpenRouterModel</text>
  <text x="210" y="338" text-anchor="middle" font-size="12" fill="#64748B">openrouter/free</text>
  <!-- Provider label -->
  <rect x="155" y="352" width="110" height="24" rx="6" fill="#1E3A5F" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="210" y="368" text-anchor="middle" font-size="11" fill="#93C5FD">OpenRouterProvider</text>
  <!-- Pydantic AI agent box below -->
  <rect x="100" y="388" width="220" height="30" rx="6" fill="#1A2744" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.3"/>
  <text x="210" y="408" text-anchor="middle" font-size="12" fill="#7C9CBF">Agent(model, output_type=CalenderEvent)</text>

  <!-- ── Middle: streaming pipe ── -->
  <!-- Main arrow line -->
  <line x1="350" y1="315" x2="590" y2="315" stroke="url(#streamline)" stroke-width="3"/>
  <polygon points="590,307 606,315 590,323" fill="#0E9488"/>
  <!-- Label -->
  <text x="478" y="300" text-anchor="middle" font-size="13" fill="#64748B">run_stream()</text>
  <!-- Token bubbles flowing -->
  <g filter="url(#softglow)">
    <rect x="360" y="328" width="54" height="22" rx="5" fill="#1E293B" stroke="#4F46E5" stroke-width="1.2"/>
    <text x="387" y="343" text-anchor="middle" font-size="10" fill="#93C5FD">"Alice"</text>
    <rect x="424" y="328" width="54" height="22" rx="5" fill="#1E293B" stroke="#4F46E5" stroke-width="1.2" opacity="0.8"/>
    <text x="451" y="343" text-anchor="middle" font-size="10" fill="#93C5FD">" and "</text>
    <rect x="488" y="328" width="54" height="22" rx="5" fill="#1E293B" stroke="#4F46E5" stroke-width="1.2" opacity="0.6"/>
    <text x="515" y="343" text-anchor="middle" font-size="10" fill="#93C5FD">"Bob"</text>
    <rect x="552" y="328" width="40" height="22" rx="5" fill="#1E293B" stroke="#4F46E5" stroke-width="1.2" opacity="0.3"/>
    <text x="572" y="343" text-anchor="middle" font-size="10" fill="#64748B">···</text>
  </g>
  <!-- stream_output() label -->
  <text x="478" y="375" text-anchor="middle" font-size="11" fill="#4F46E5">stream_output() →  partial CalenderEvent</text>

  <!-- ── Right: structured output box ── -->
  <rect x="620" y="180" width="490" height="270" rx="16" fill="url(#outputgrad)" stroke="#0E9488" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="865" y="215" text-anchor="middle" font-size="14" font-weight="700" fill="#6EE7B7" letter-spacing="1">CalenderEvent</text>
  <text x="865" y="233" text-anchor="middle" font-size="11" fill="#64748B">pydantic.BaseModel</text>

  <!-- Field rows -->
  <!-- name field - partial -->
  <rect x="648" y="248" width="434" height="36" rx="6" fill="#0F2E28" stroke="#0E9488" stroke-width="1" stroke-opacity="0.4"/>
  <text x="668" y="264" font-size="12" fill="#64748B">name</text>
  <text x="668" y="278" font-size="11" fill="#34D399">"Science Fair 2026"</text>
  <rect x="990" y="258" width="72" height="16" rx="3" fill="#164E47"/>
  <text x="1026" y="270" text-anchor="middle" font-size="9" fill="#6EE7B7">✓ complete</text>

  <!-- date field - partial -->
  <rect x="648" y="294" width="434" height="36" rx="6" fill="#0F2E28" stroke="#0E9488" stroke-width="1" stroke-opacity="0.4"/>
  <text x="668" y="310" font-size="12" fill="#64748B">date</text>
  <text x="668" y="324" font-size="11" fill="#34D399">"Friday, June 26 2026"</text>
  <rect x="990" y="304" width="72" height="16" rx="3" fill="#164E47"/>
  <text x="1026" y="316" text-anchor="middle" font-size="9" fill="#6EE7B7">✓ complete</text>

  <!-- participants field - streaming -->
  <rect x="648" y="340" width="434" height="36" rx="6" fill="#0F2E28" stroke="#4F46E5" stroke-width="1" stroke-opacity="0.4"/>
  <text x="668" y="356" font-size="12" fill="#64748B">participants</text>
  <text x="668" y="370" font-size="11" fill="#93C5FD">["Alice", "Bob"···</text>
  <rect x="990" y="350" width="72" height="16" rx="3" fill="#1E3A5F"/>
  <text x="1026" y="362" text-anchor="middle" font-size="9" fill="#93C5FD">streaming…</text>

  <!-- get_output() final -->
  <rect x="648" y="390" width="434" height="44" rx="6" fill="#0A1A12" stroke="#0E9488" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="865" y="408" text-anchor="middle" font-size="11" fill="#6EE7B7">await result.get_output()</text>
  <text x="865" y="424" text-anchor="middle" font-size="10" fill="#64748B">→ fully-validated CalenderEvent</text>

  <!-- ── Title block ── -->
  <text x="600" y="100" text-anchor="middle" font-size="38" font-weight="700" fill="#F1F5F9" letter-spacing="-0.5">Streaming Structured Output</text>
  <text x="600" y="140" text-anchor="middle" font-size="20" fill="#94A3B8">Pydantic AI  ·  OpenRouter  ·  Async Streaming</text>

  <!-- Bottom caption -->
  <text x="600" y="590" text-anchor="middle" font-size="13" fill="#475569">async with agent.run_stream(prompt) as result:</text>
</svg>
