<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" style="font-family:-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="fbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/>
    </marker>
  </defs>

  <rect width="1100" height="520" fill="url(#fbg)" rx="16"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" fill="#94A3B8" font-size="14" font-weight="600" letter-spacing="2">DATA FLOW — streaming.py</text>

  <!-- === Column 1: LLM stream === -->
  <rect x="40" y="65" width="160" height="72" rx="10" fill="#4F46E5" fill-opacity="0.15" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="120" y="94" text-anchor="middle" fill="#A5B4FC" font-size="13" font-weight="600">Pydantic AI</text>
  <text x="120" y="112" text-anchor="middle" fill="#6366F1" font-size="12">agent.run_stream()</text>
  <text x="120" y="128" text-anchor="middle" fill="#475569" font-size="11">OpenRouter /free</text>

  <!-- arrow down to delta loop -->
  <line x1="120" y1="137" x2="120" y2="176" stroke="#4F46E5" stroke-width="1.5" marker-end="url(#arr3)"/>

  <rect x="40" y="178" width="160" height="56" rx="10" fill="#4F46E5" fill-opacity="0.1" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="120" y="200" text-anchor="middle" fill="#94A3B8" font-size="11">async for delta in</text>
  <text x="120" y="218" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="Menlo,Monaco,monospace">stream_text(delta=True)</text>

  <!-- arrow right to ArticleStreamPrinter -->
  <line x1="200" y1="206" x2="274" y2="206" stroke="#06B6D4" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="237" y="198" text-anchor="middle" fill="#475569" font-size="10">delta str</text>

  <!-- === Column 2: ArticleStreamPrinter === -->
  <rect x="276" y="65" width="230" height="310" rx="12" fill="#06B6D4" fill-opacity="0.06" stroke="#06B6D4" stroke-width="1.5"/>
  <text x="391" y="88" text-anchor="middle" fill="#67E8F9" font-size="12" font-weight="700" letter-spacing="1">ArticleStreamPrinter</text>

  <!-- .feed() box -->
  <rect x="296" y="98" width="190" height="50" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="391" y="118" text-anchor="middle" fill="#7DD3FC" font-size="12" font-family="Menlo,Monaco,monospace">.feed(text)</text>
  <text x="391" y="136" text-anchor="middle" fill="#475569" font-size="10">iterates char-by-char</text>

  <!-- state guard -->
  <rect x="296" y="162" width="190" height="68" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="391" y="181" text-anchor="middle" fill="#94A3B8" font-size="11">guard: skip until</text>
  <text x="391" y="197" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="Menlo,Monaco,monospace">char in "{["</text>
  <text x="391" y="215" text-anchor="middle" fill="#475569" font-size="10">_started = True</text>
  <text x="391" y="228" text-anchor="middle" fill="#475569" font-size="10">(skips prose / code fences)</text>

  <!-- jsonsax.Parser call -->
  <rect x="296" y="244" width="190" height="50" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="391" y="264" text-anchor="middle" fill="#7DD3FC" font-size="12" font-family="Menlo,Monaco,monospace">_parser.feed(char)</text>
  <text x="391" y="282" text-anchor="middle" fill="#475569" font-size="10">jsonsax.Parser</text>

  <!-- _complete guard -->
  <rect x="296" y="308" width="190" height="50" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="391" y="328" text-anchor="middle" fill="#94A3B8" font-size="11">stop when</text>
  <text x="391" y="344" text-anchor="middle" fill="#C7D2FE" font-size="12" font-family="Menlo,Monaco,monospace">path == "$"</text>
  <text x="391" y="360" text-anchor="middle" fill="#475569" font-size="10">_on_root_close → _complete=True</text>

  <!-- internal arrows -->
  <line x1="391" y1="148" x2="391" y2="162" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="391" y1="230" x2="391" y2="244" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="391" y1="294" x2="391" y2="308" stroke="#334155" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- arrow right to jsonsax -->
  <line x1="506" y1="269" x2="580" y2="269" stroke="#06B6D4" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- === Column 3: jsonsax state machine === -->
  <rect x="582" y="65" width="220" height="310" rx="12" fill="#06B6D4" fill-opacity="0.04" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="692" y="88" text-anchor="middle" fill="#22D3EE" font-size="12" font-weight="700" letter-spacing="1">jsonsax.Parser</text>

  <!-- states -->
  <rect x="602" y="100" width="180" height="38" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="692" y="124" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Menlo,Monaco,monospace">_VALUE → _OBJ_FIRST</text>

  <rect x="602" y="150" width="180" height="38" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="692" y="174" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Menlo,Monaco,monospace">_OBJ_KEY → _OBJ_COLON</text>

  <rect x="602" y="200" width="180" height="38" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="692" y="224" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Menlo,Monaco,monospace">_OBJ_COLON → _VALUE</text>

  <rect x="602" y="250" width="180" height="38" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="692" y="274" text-anchor="middle" fill="#7DD3FC" font-size="11" font-family="Menlo,Monaco,monospace">_ARR_FIRST → _ARR_NEXT</text>

  <rect x="602" y="300" width="180" height="38" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="692" y="324" text-anchor="middle" fill="#22D3EE" font-size="11" font-family="Menlo,Monaco,monospace">_DONE → fires events</text>

  <!-- connecting lines between states -->
  <g stroke="#1E3A5F" stroke-width="1" stroke-dasharray="3,2">
    <line x1="692" y1="138" x2="692" y2="150"/>
    <line x1="692" y1="188" x2="692" y2="200"/>
    <line x1="692" y1="238" x2="692" y2="250"/>
    <line x1="692" y1="288" x2="692" y2="300"/>
  </g>

  <!-- arrow right to callbacks -->
  <line x1="802" y1="269" x2="876" y2="269" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr2)"/>
  <text x="839" y="260" text-anchor="middle" fill="#475569" font-size="10">events</text>

  <!-- === Column 4: callbacks === -->
  <rect x="878" y="65" width="192" height="310" rx="12" fill="#F59E0B" fill-opacity="0.06" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="974" y="88" text-anchor="middle" fill="#FCD34D" font-size="12" font-weight="700" letter-spacing="1">_on_value()</text>

  <rect x="898" y="100" width="152" height="42" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="974" y="118" text-anchor="middle" fill="#FDE68A" font-size="11" font-family="Menlo,Monaco,monospace">path == "$.title"</text>
  <text x="974" y="134" text-anchor="middle" fill="#78716C" font-size="10">→ print "# {value}"</text>

  <rect x="898" y="154" width="152" height="42" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="974" y="172" text-anchor="middle" fill="#FDE68A" font-size="11" font-family="Menlo,Monaco,monospace">endswith(".title")</text>
  <text x="974" y="188" text-anchor="middle" fill="#78716C" font-size="10">→ print "## {value}"</text>

  <rect x="898" y="208" width="152" height="42" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="974" y="226" text-anchor="middle" fill="#FDE68A" font-size="11" font-family="Menlo,Monaco,monospace">endswith(".content")</text>
  <text x="974" y="242" text-anchor="middle" fill="#78716C" font-size="10">→ print body text</text>

  <rect x="898" y="262" width="152" height="58" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <text x="974" y="280" text-anchor="middle" fill="#FDE68A" font-size="11" font-family="Menlo,Monaco,monospace">startswith(</text>
  <text x="974" y="296" text-anchor="middle" fill="#FDE68A" font-size="11" font-family="Menlo,Monaco,monospace">"$.follow_ups[")</text>
  <text x="974" y="312" text-anchor="middle" fill="#78716C" font-size="10">→ print "- {value}"</text>

  <!-- === Bottom: validate === -->
  <rect x="276" y="415" width="794" height="56" rx="10" fill="#4F46E5" fill-opacity="0.08" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="673" y="440" text-anchor="middle" fill="#94A3B8" font-size="12">after stream ends:</text>
  <text x="673" y="460" text-anchor="middle" fill="#C7D2FE" font-size="13" font-family="Menlo,Monaco,monospace">ArticleResponse.model_validate_json(_clean_json(raw))</text>

  <!-- arrows down to validate -->
  <line x1="391" y1="375" x2="391" y2="415" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr3)"/>
  <line x1="692" y1="375" x2="692" y2="415" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr3)"/>

  <!-- legend -->
  <g transform="translate(40, 440)">
    <line x1="0" y1="10" x2="24" y2="10" stroke="#06B6D4" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="30" y="14" fill="#64748B" font-size="11">stream data</text>
    <line x1="120" y1="10" x2="144" y2="10" stroke="#F59E0B" stroke-width="1.5" marker-end="url(#arr2)"/>
    <text x="150" y="14" fill="#64748B" font-size="11">events</text>
    <line x1="220" y1="10" x2="244" y2="10" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr3)"/>
    <text x="250" y="14" fill="#64748B" font-size="11">post-stream</text>
  </g>
</svg>
