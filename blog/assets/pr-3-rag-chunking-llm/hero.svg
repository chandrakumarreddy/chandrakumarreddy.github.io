<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#334155" stroke-width="1" opacity="0.25">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
  </g>

  <text x="80" y="120" fill="#94a3b8" font-size="22" letter-spacing="3">PULL REQUEST #3 · RAG PIPELINE</text>

  <text x="80" y="215" fill="#f8fafc" font-size="68" font-weight="700">Chunk it. Retrieve it.</text>
  <text x="80" y="295" fill="#f8fafc" font-size="68" font-weight="700">Ground the answer.</text>

  <rect x="80" y="330" width="260" height="6" rx="3" fill="url(#accent)"/>

  <text x="80" y="392" fill="#cbd5e1" font-size="26">From a GitHub repo to a grounded LLM answer —</text>
  <text x="80" y="428" fill="#cbd5e1" font-size="26">overlapping chunks, minsearch, and pydantic-ai.</text>

  <!-- pipeline glyph -->
  <g transform="translate(80,500)">
    <g>
      <rect x="0" y="0" width="150" height="64" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
      <text x="75" y="32" fill="#a5b4fc" font-size="18" text-anchor="middle">GitHub</text>
      <text x="75" y="52" fill="#64748b" font-size="14" text-anchor="middle">.md / .mdx</text>
    </g>
    <g transform="translate(225,0)">
      <rect x="0" y="0" width="150" height="64" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
      <text x="75" y="32" fill="#67e8f9" font-size="18" text-anchor="middle">Chunks</text>
      <text x="75" y="52" fill="#64748b" font-size="14" text-anchor="middle">1000 / 200</text>
    </g>
    <g transform="translate(450,0)">
      <rect x="0" y="0" width="150" height="64" rx="12" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
      <text x="75" y="32" fill="#67e8f9" font-size="18" text-anchor="middle">minsearch</text>
      <text x="75" y="52" fill="#64748b" font-size="14" text-anchor="middle">retrieve top-10</text>
    </g>
    <g transform="translate(675,0)">
      <rect x="0" y="0" width="170" height="64" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
      <text x="85" y="32" fill="#fcd34d" font-size="18" text-anchor="middle">pydantic-ai</text>
      <text x="85" y="52" fill="#64748b" font-size="14" text-anchor="middle">grounded answer</text>
    </g>
    <g fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)">
      <line x1="150" y1="32" x2="223" y2="32"/>
      <line x1="375" y1="32" x2="448" y2="32"/>
      <line x1="600" y1="32" x2="673" y2="32"/>
    </g>
  </g>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
