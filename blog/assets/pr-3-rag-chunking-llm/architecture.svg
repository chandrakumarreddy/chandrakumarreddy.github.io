<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="a" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto">
      <path d="M0,0 L9,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="40" y="46" fill="#0f172a" font-size="26" font-weight="700">RAG pipeline: index once, answer in a loop</text>
  <text x="40" y="74" fill="#64748b" font-size="16">rag_search_chunk_llm.py orchestrates GithubSource, minsearch, and a pydantic-ai Agent</text>

  <!-- INDEX phase -->
  <rect x="40" y="100" width="440" height="200" rx="14" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="60" y="130" fill="#4338ca" font-size="16" font-weight="700">INDEX (once, at startup)</text>

  <rect x="60" y="146" width="180" height="58" rx="10" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="150" y="172" fill="#312e81" font-size="15" text-anchor="middle" font-weight="600">GithubSource.fetch()</text>
  <text x="150" y="192" fill="#64748b" font-size="13" text-anchor="middle">download + parse docs</text>

  <rect x="280" y="146" width="180" height="58" rx="10" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="370" y="172" fill="#155e75" font-size="15" text-anchor="middle" font-weight="600">chunk_documents()</text>
  <text x="370" y="192" fill="#64748b" font-size="13" text-anchor="middle">size 1000 / overlap 200</text>

  <rect x="170" y="226" width="180" height="58" rx="10" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="260" y="252" fill="#155e75" font-size="15" text-anchor="middle" font-weight="600">Index.fit(chunks)</text>
  <text x="260" y="272" fill="#64748b" font-size="13" text-anchor="middle">minsearch text + keyword</text>

  <g fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)">
    <line x1="240" y1="175" x2="278" y2="175"/>
    <line x1="370" y1="204" x2="300" y2="224"/>
  </g>

  <!-- QUERY phase -->
  <rect x="520" y="100" width="440" height="380" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="540" y="130" fill="#b45309" font-size="16" font-weight="700">ANSWER (per question)</text>

  <rect x="540" y="146" width="180" height="54" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="630" y="170" fill="#7c2d12" font-size="15" text-anchor="middle" font-weight="600">user query</text>
  <text x="630" y="189" fill="#64748b" font-size="13" text-anchor="middle">input() loop</text>

  <rect x="540" y="222" width="180" height="54" rx="10" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="630" y="246" fill="#155e75" font-size="15" text-anchor="middle" font-weight="600">index.search()</text>
  <text x="630" y="265" fill="#64748b" font-size="13" text-anchor="middle">top-10, boost content 1.5</text>

  <rect x="540" y="298" width="180" height="54" rx="10" fill="#fff" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="630" y="322" fill="#155e75" font-size="15" text-anchor="middle" font-weight="600">format_context()</text>
  <text x="630" y="341" fill="#64748b" font-size="13" text-anchor="middle">Source / Title / body</text>

  <rect x="540" y="374" width="180" height="54" rx="10" fill="#fff" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="630" y="398" fill="#7c2d12" font-size="15" text-anchor="middle" font-weight="600">Agent.run_stream()</text>
  <text x="630" y="417" fill="#64748b" font-size="13" text-anchor="middle">OpenRouter, grounded</text>

  <rect x="760" y="374" width="180" height="54" rx="10" fill="#0f172a"/>
  <text x="850" y="398" fill="#f8fafc" font-size="15" text-anchor="middle" font-weight="600">streamed answer</text>
  <text x="850" y="417" fill="#94a3b8" font-size="13" text-anchor="middle">delta=True</text>

  <g fill="none" stroke="#64748b" stroke-width="1.6" marker-end="url(#a)">
    <line x1="630" y1="200" x2="630" y2="220"/>
    <line x1="630" y1="276" x2="630" y2="296"/>
    <line x1="630" y1="352" x2="630" y2="372"/>
    <line x1="720" y1="401" x2="758" y2="401"/>
  </g>

  <!-- cross arrow index -> search -->
  <g fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#a)">
    <path d="M350 255 C 440 255, 440 249, 538 249"/>
  </g>
  <text x="400" y="240" fill="#94a3b8" font-size="13">shared Index</text>

  <text x="540" y="462" fill="#92400e" font-size="13">SYSTEM_PROMPT enforces: answer only from retrieved context</text>
</svg>
